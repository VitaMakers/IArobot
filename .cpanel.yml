---
deployment:
  tasks:
    - export DEPLOYPATH=$HOME/vitacontent.online/
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/cp -f index.html "$DEPLOYPATH"
    - /bin/mkdir -p "$DEPLOYPATH/css" "$DEPLOYPATH/js"
    - /bin/cp -f css/*.css "$DEPLOYPATH/css/"
    - /bin/cp -f js/*.js "$DEPLOYPATH/js/"
    - if [ -d assets ]; then /bin/cp -Rf assets "$DEPLOYPATH"; fi
    - if [ -f .htaccess ]; then /bin/cp -f .htaccess "$DEPLOYPATH"; fi
    - if [ -f robots.txt ]; then /bin/cp -f robots.txt "$DEPLOYPATH"; fi
    - if [ -f sitemap.xml ]; then /bin/cp -f sitemap.xml "$DEPLOYPATH"; fi
